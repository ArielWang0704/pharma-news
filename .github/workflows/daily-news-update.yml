name: Daily Pharma News Update

on:
  schedule:
    # Beijing 10:00 on workdays = UTC 02:00.
    - cron: "0 2 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-pharma-news-update
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update pharma news dashboard
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python scripts/update_news.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No website changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .news-update-state.json
          git commit -m "Daily pharma news update"
          git push
