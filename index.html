<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pharma News Dashboard</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d8e0ea;
      --primary: #1f4e79;
      --primary-soft: #e7f0f8;
      --accent: #2f6f73;
      --accent-soft: #e8f3f2;
      --warning: #8a5a12;
      --warning-soft: #fff3d8;
      --shadow: 0 10px 24px rgba(23, 32, 51, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 44px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
      color: var(--primary);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .updated {
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 170px 170px 190px;
      gap: 12px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      background: var(--panel);
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 6px 0 16px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    .tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #ffffff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
    }

    .stat.action {
      cursor: pointer;
      text-align: left;
      font: inherit;
    }

    .stat.action.active {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .stat .value {
      font-size: 24px;
      line-height: 1.1;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .stat .label {
      font-size: 12px;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 290px;
      gap: 16px;
      align-items: start;
    }

    .news-list {
      display: grid;
      gap: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-main {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .date {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      color: var(--text);
    }

    .summary {
      margin: 0;
      color: #344054;
      line-height: 1.6;
      font-size: 14px;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
    }

    .badge.secondary {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .badge.warning {
      background: var(--warning-soft);
      color: var(--warning);
    }

    details {
      border-top: 1px solid var(--line);
      padding: 0 16px 14px;
    }

    summary {
      cursor: pointer;
      padding: 12px 0;
      color: var(--primary);
      font-size: 14px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .detail-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: #fbfcfe;
    }

    .detail-box h3 {
      margin: 0 0 6px;
      font-size: 13px;
      color: var(--primary);
    }

    .detail-box p {
      margin: 0;
      color: #344054;
      line-height: 1.55;
      font-size: 13px;
    }

    .timeline {
      display: grid;
      gap: 8px;
      margin: 4px 0 12px;
    }

    .event {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 10px;
      align-items: start;
    }

    .event-date {
      font-size: 12px;
      color: var(--muted);
      padding-top: 2px;
    }

    .event-body {
      border-left: 3px solid var(--primary-soft);
      padding-left: 10px;
      font-size: 13px;
      line-height: 1.55;
      color: #344054;
    }

    .sources {
      display: grid;
      gap: 6px;
      font-size: 12px;
      line-height: 1.5;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .side {
      display: grid;
      gap: 12px;
      position: sticky;
      top: 16px;
    }

    .side-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
    }

    .side-card h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--primary);
    }

    .side-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: #344054;
      font-size: 13px;
      line-height: 1.45;
    }

    .switch-box {
      display: flex;
      align-items: center;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 0 12px;
      gap: 8px;
    }

    .switch-box input {
      width: auto;
      margin: 0;
    }

    .switch-box span {
      font-size: 14px;
      color: var(--text);
    }

    .empty {
      display: none;
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .empty.show { display: block; }

    @media (max-width: 880px) {
      header,
      .toolbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .updated { white-space: normal; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .side { position: static; }
    }

    @media (max-width: 560px) {
      .page { padding: 20px 12px 34px; }
      .stats { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .card-top { display: grid; }
      .event { grid-template-columns: 1fr; gap: 4px; }
    }
  </style>
</head>

      </div>
      <div>
        <label for="month">月份</label>
        <select id="month"></select>
      </div>
      <div>

        <select id="sort">

      </div>
    </section>

    <nav class="tabs" id="tabs" aria-label="新闻类型"></nav>

    <section class="stats" aria-label="概览">

      <div class="stat"><div class="value" id="stat-updates">0</div><div class="label">进展记录</div></div>
      <button class="stat action" id="stat-high-card" type="button"><div class="value" id="stat-high">0</div><div class="label">Viatris高相关</div></button>
      <div class="stat"><div class="value" id="stat-latest">-</div><div class="label">最新新闻日期</div></div>
      <div class="stat"><div class="value" id="stat-page-updated">2026.07.07</div><div class="label">本页更新</div></div>
    </section>

    <main class="layout">
      <section>
        <div class="news-list" id="newsList"></div>
        <div class="empty" id="empty">没有匹配的新闻。换个关键词或切换tab试试。</div>
      </section>

      <aside class="side">
        <div class="side-card">
          <h3>今年值得记住</h3>
          <ul class="side-list" id="weeklyTakeaways"></ul>
        </div>
        <div class="side-card">
          <h3>可复用观点</h3>
          <ul class="side-list" id="discussionPoints"></ul>
        </div>
        <div class="side-card">
          <h3>后续重点追踪</h3>
          <ul class="side-list" id="watchList"></ul>
        </div>
      </aside>
    </main>
  </div>

    const eventDetails = {
      "az-cspc-obesity-2026": "2026年1月，阿斯利康与石药集团达成肥胖和2型糖尿病方向的大额合作，是今年中国创新药出海的重要开场。交易覆盖8个项目，其中包括临床准备阶段资产SYH2082，以及多个利用石药AI驱动多肽发现平台和月制剂技术的候选项目。阿斯利康获得中国以外的全球权益，石药获得12亿美元首付款和最高173亿美元里程碑付款。这类交易的重点不是“金额很大”本身，而是MNC在全球GLP-1和代谢竞争中，愿意把中国公司的平台能力纳入核心组合。它也说明中国Biotech的价值正在从单个fast follow资产，延伸到递送技术、长效制剂、AI筛选和连续管线生产能力。",
      "china-biotech-license-boom-2026": "2026年初，Reuters对中国Biotech授权交易做了系统性报道：全球药企因专利悬崖、研发成本上升和管线压力，继续向中国寻找实验性药物资产。中国过去几年积累了大量ADC、双抗、GLP-1、细胞治疗、小核酸和肿瘤靶向资产，临床推进速度和成本效率也有优势。因此，license-out不再只是个别公司融资手段，而是中国创新药参与全球产业链的核心路径。看这类新闻时要警惕一个误区：总金额通常包含多年开发和商业里程碑，不等于公司马上拿到的钱。真正要看首付款、近期付款、权益区域、资产阶段和MNC是否愿意投入后续开发资源。",
      "az-china-compliance-2026": "阿斯利康前中国负责人被起诉，是2026年MNC中国合规主线中最有代表性的事件之一。报道提到相关指控涉及医保欺诈、非法交易和个人信息收集等问题。它发生在阿斯利康持续加码中国投资、BD和研发合作的大背景下，所以不是简单的个案新闻，而是提醒MNC：中国市场一方面仍然重要，另一方面医保基金、数据合规、反腐、患者项目和第三方服务商管理都在进入更高压监管状态。真正值得提炼的观点是，合规要前置到业务设计阶段；涉及医保支付、患者数据、医生互动、第三方执行和互联网平台的项目，都需要先明确增长逻辑和风险边界。",
      "ai-drug-regulation-2026": "国家药监局发布“人工智能+药品监管”实施意见，说明AI正在从企业内部效率工具，进入监管体系本身。文件提出到2030年形成药品监管与AI融合创新体系，并在审评审批、监督检查、检验监测、政务服务等场景中应用。对企业的启发是：未来监管沟通会越来越依赖结构化数据、全流程留痕和可追溯证据。注册、质量、药物警戒、合规和医学事务团队，可能都需要适应更数字化的监管环境。它对业务短期销量影响不大，但会改变企业长期运营能力，尤其是跨部门流程和数据治理。",
      "siemens-diagnostics-china-2026": "Siemens Healthineers下调2026年展望，核心压力来自诊断业务和中国市场，是“控费外溢到器械/诊断”的重要样本。中国曾是跨国诊断企业的重要增长市场，但报销水平下降、带量采购、国产替代和医院成本控制正在改变IVD商业模式。诊断不像药品那样直接面向患者品牌，但它深度嵌入医院检验、病理、影像和治疗决策流程。该事件说明广义医药健康分析不能只盯药品，IVD、设备、耗材和诊断上游同样会被医保支付和医院控费影响。更可复用的观点是，药、械、诊断要放在同一个支付治理框架里看。",
      "gcp-revision-2026": "新版药物临床试验质量管理规范将在2026年9月1日施行，背景是中国创新药临床试验数量快速上升，同时全球市场也越来越关注中国临床数据的质量和国际可接受性。新版GCP强调数据治理、伦理审查、主要研究者责任、受试者保护和全过程质量管理。它与6月底美国对MNC中国临床试验的审查形成呼应：一边是中国提升临床研发效率和质量标准，另一边是海外监管和政治环境对中国数据提出更多问题。后续观察重点不是单个条款，而是它会不会提高临床成本、延长周期、改善数据可信度，并帮助中国创新药更顺利走向海外注册。",
      "glp1-china-2026": "GLP-1是2026年最值得持续跟踪的慢病赛道。3月，Pfizer/Sciwind的ecnoglutide在中国获批长期体重管理，说明中国本土创新资产和MNC商业化合作正在结合。6月，Novo表示将推进口服Wegovy中国申请，礼来也释放orforglipron中国上市节奏，口服剂型可能降低患者对注射的心理门槛。6月底，Pfizer/信达GLP-1通过医保初审，同时中国翰宇的tirzepatide仿制版本进入FDA审评。把这些串起来看，GLP-1竞争已经包括疗效、剂型、医保、自费、线上渠道、供应能力、专利和仿制化。它是观察慢病商业模式变化的最好案例。",
      "nhsa-drug-finder": "国家医保局上线“医保找药”功能，看起来是便民服务，但对药品可及性和院外渠道有更深影响。它允许患者查询某种医保药或商保创新药在过去一个月内，哪些定点医疗机构或定点零售药店有过结算记录，并且每日更新。过去很多创新药即使进入医保，患者仍可能遇到医院不进药、药房不知道哪里有、处方流转不顺的问题。这个功能把“能不能买到”变得更透明。对药企来说，未来准入后管理不只是看目录和价格，还要看真实可及网点、定点药店承接和患者找药路径。",
      "orpathys-gastric-cancer": "ORPATHYS胃癌适应症获批，是精准肿瘤治疗继续按生物标志物细分的案例。该药用于MET扩增的局部晚期或转移性胃癌/胃食管结合部腺癌患者，适用人群为至少二线系统治疗失败者。HUTCHMED披露关键II期研究中独立评审ORR为32.3%、DCR为63.1%、中位DoR为9.7个月。对行业的重点不是单个适应症，而是“药物+检测”的商业化逻辑：如果MET检测率不足，符合条件患者找不到，药物就很难放量。未来肿瘤创新药商业化越来越依赖伴随诊断、病理流程、NGS可及性和医生对标志物的认知。",
      "nr-vbp-round12": "第12批国采启动，是成熟药市场继续被支付治理重塑的代表。公告要求企业提交注册批件、参比制剂或过评证明、GMP材料、产能声明、知识产权承诺等。它说明国采已经不是简单压价，而是把价格、质量、供应、知识产权和挂网资格一起治理。对Viatris这类有成熟品牌和仿制药逻辑的公司，这是高相关事件：它会影响价格锚、医院准入、院外承接、产品生命周期和资源配置。它的启发是，不能只估降价幅度，还要拆销量承诺、渠道迁移、库存、供应保障和替代格局。",
      "solid-tumor-cart": "科济CAR-T实体瘤适应症获批，被Reuters称为全球首个获批用于实体瘤的CAR-T疗法，是中国创新疗法的重要里程碑。CAR-T此前主要用于血液肿瘤，实体瘤面临肿瘤微环境、靶点异质性、T细胞浸润和安全性等挑战。获批说明科学和注册层面迈出关键一步，但商业化仍需要回答定价、治疗中心、制备周期、支付可及、真实世界疗效等问题。它很适合用来训练创新药判断：获批不等于商业成功，要区分科学突破、注册成功、支付可及和商业放量四个阶段。",
      "merck-biotechne": "Merck KGaA收购Bio-Techne，是生命科学工具和精准诊断上游价值被重估的代表。Bio-Techne提供蛋白、抗体、分析技术等工具，服务生物研究、细胞基因治疗和精准诊断。它不是终端药品公司，但嵌入了药物研发、生产质控和诊断流程。疫情后生命科学工具行业估值回落，但长期来看，创新药研发、细胞基因治疗、伴随诊断和科研服务仍需要高质量工具平台。这条新闻提醒我们不要只看药企商业化，生命科学工具、诊断上游和平台型公司也是医药健康产业的重要部分。",
      "device-udi-standards": "器械/IVD的2026主线不是某一个爆炸性单品，而是监管数字化、标准化和采购控费持续推进。UDI扩展意味着更多第二类器械、体外诊断试剂和第一类器械会进入唯一标识管理，产品追溯、供应链管理和监管数据会更结构化。与此同时，创新器械审批保持活跃，但诊断业务又面临报销和采购压力。把这些放在一起看，器械/诊断企业需要同时应对创新审批、质量体系、采购价格和院内运营效率。它与药品精准治疗也有关，因为肿瘤靶向药放量越来越依赖检测能力。",
      "lilly-innovent-verzenio-china-commercialization-20260630": "Reuters 6月30日报道，礼来将 Verzenio 在中国大陆的商业化权利转给信达生物，礼来仍保留生产、供应和开发责任。报道指出，该产品在中国面临本土仿制竞争压力。这条新闻的意义不只是肿瘤药商业化变化，而是 MNC 中国业务模式的一个典型样本：当产品进入更激烈的后生命周期阶段，继续全链条自营未必是最优选择。MNC 可能保留生产、供应、医学和开发责任，同时把地面商业化、渠道覆盖、院内准入维护交给本土平台。对 Viatris 高相关，因为 Viatris 中国业务与成熟品牌、仿制药竞争、渠道效率、生命周期管理高度相关。",
      "astrazeneca-cspc-kidney-disease-bd-20260702": "Reuters 7月2日报道，阿斯利康与石药集团达成最高17.7亿美元合作，用于发现和开发治疗肾脏疾病的实验性药物。公开报道未披露具体靶点和疾病亚型。这条新闻应放在中国创新药出海和 MNC 外部创新的大背景下理解：过去中国 license-out 高度集中在肿瘤、ADC、免疫等领域，而肾病这类慢病专科领域也开始进入 MNC 的全球管线补强视野。对行业而言，这说明中国资产价值不只来自 fast follow，也可能来自早研效率、疾病机制探索和临床开发速度。",
      "us-house-china-clinical-trials-probe-20260630": "Reuters 6月30日报道，美国众议院美中战略竞争特别委员会对 Merck、AbbVie、Eli Lilly、Pfizer、BMS 等药企在中国开展临床试验发起调查，关注点包括新疆、军队医院、知情同意、伦理标准、知识产权和国家安全风险。Merck 和 AbbVie 被要求在7月17日前提供详细信息。这条新闻说明，MNC 在中国做研发和临床试验的价值叙事正在被重新审视。过去中国临床试验常被视为速度快、患者资源丰富、成本效率高；现在还必须同时回答伦理合规、机构选择、数据可信度、跨境信息和地缘政治风险问题。",
      "nhsa-2026-nrdl-commercial-insurance-initial-review-20260629": "国家医保局6月29日公示2026年国家基本医疗保险、生育保险和工伤保险药品目录及商业健康保险创新药品目录调整初步形式审查结果。此次共收到企业申报资料818份，涉及674个药品通用名；申请基本目录外375个通用名，通过初审334个；目录内229个通用名，通过初审223个。商保创新药目录方面，目录外57个通用名通过初审53个，目录内1个通用名通过初审1个。形式审查通过不代表纳入目录，只代表具备进入后续评审、测算、谈判等流程的资格。这条新闻说明，创新药支付正在从单一医保准入走向“基本医保+商保创新药目录”的分层支付体系。",
      "nmpa-device-classification-change-management-20260701": "行业合规报道显示，NMPA 52/2026 关于医疗器械分类变更管理的措施自2026年6月1日起生效，主要为医疗器械分类变更提供统一程序框架。该事件不是单一产品获批新闻，但对器械和IVD企业具有长期意义：分类变化会影响注册路径、临床评价要求、上市节奏和合规成本。它也提醒我们，医药健康市场雷达不能只看药品，器械/诊断的监管、分类、临床评价和采购支付同样会影响行业格局。"
};

    newsData.forEach(item => {
      item.detail = eventDetails[item.id] || item.summary;
    });

    const weeklyTakeaways = [
      "MNC 中国业务正在从“全链条自营”走向“价值链重分工”，尤其是成熟/后生命周期产品。",
      "中国创新药资产仍是 MNC 全球外部创新的重要来源，且疾病领域正从肿瘤外溢到肾病、代谢等专科慢病。",
      "支付体系正在从单一医保谈判走向基本医保、商保创新药目录、院外和患者自费的组合设计。",
      "在华临床研发的评价维度正在从效率扩展到伦理、数据、机构选择和地缘合规。"
];

    const discussionPoints = [
      "判断一条医药新闻，不只看产品本身，还要看它改变的是支付规则、渠道效率、组织分工还是合规边界。",
      "对 MNC 中国业务而言，商业化效率和合规韧性正在变得和产品力一样重要。",
      "看 BD 新闻不能只看总金额，首付款比例、权益范围、临床阶段和开发责任更能反映资产质量。"
];

    const dashboardUpdated = "2026-07-07";

    const tabs = ["全部", "政策/支付", "药品/创新药", "医疗器械/诊断", "BD/投融资", "组织/合规", "渠道/患者", "数字医疗/AI"];
    let activeTab = "全部";

    const els = {
      updated: document.getElementById("updated"),
      search: document.getElementById("search"),
      month: document.getElementById("month"),
      sort: document.getElementById("sort"),
      highOnly: document.getElementById("highOnly"),
      tabs: document.getElementById("tabs"),
      list: document.getElementById("newsList"),
      empty: document.getElementById("empty"),
      statCount: document.getElementById("stat-count"),
      statUpdates: document.getElementById("stat-updates"),
      statHigh: document.getElementById("stat-high"),
      statHighCard: document.getElementById("stat-high-card"),
      statLatest: document.getElementById("stat-latest"),
      statPageUpdated: document.getElementById("stat-page-updated"),
      takeaways: document.getElementById("weeklyTakeaways"),
      watchList: document.getElementById("watchList"),
      discussionPoints: document.getElementById("discussionPoints")
    };

    function formatDate(dateText) {
      return dateText.replaceAll("-", ".");
    }

    function monthKey(dateText) {
      return dateText.slice(0, 7);
    }

    function normalize(text) {
      return String(text || "").toLowerCase();
    }

    function matchesSearchMonthHigh(item) {
      const q = normalize(els.search.value.trim());
      const selectedMonth = els.month.value;
      const monthMatch = selectedMonth === "all" || monthKey(item.date) === selectedMonth;
      const highMatch = !els.highOnly.checked || isHighImpact(item.viatrisImpact);
      const haystack = normalize([
        item.title, item.category, item.summary, item.detail, item.why, item.role, item.viatrisImpact,
        item.tags.join(" "), item.watch.join(" "),
        item.updates.map(u => `${u.date} ${u.text}`).join(" ")
      ].join(" "));
      const searchMatch = !q || haystack.includes(q);
      return monthMatch && highMatch && searchMatch;
    }

    function tabCounts() {
      const base = newsData.filter(matchesSearchMonthHigh);
      return Object.fromEntries(tabs.map(tab => [
        tab,
        tab === "全部" ? base.length : base.filter(item => item.category === tab).length
      ]));
    }

    function renderTabs() {
      const counts = tabCounts();
      els.tabs.innerHTML = tabs.map(tab => (
        `<button class="tab ${tab === activeTab ? "active" : ""}" data-tab="${tab}" type="button">${tab}（${counts[tab] || 0}）</button>`
      )).join("");
      els.tabs.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
          activeTab = btn.dataset.tab;
          render();
        });
      });
    }

    function renderMonths() {
      const months = Array.from(new Set(newsData.map(item => monthKey(item.date)))).sort().reverse();
      els.month.innerHTML = `<option value="all">全部月份</option>` + months.map(m => `<option value="${m}">${m}</option>`).join("");
    }

    function getFiltered() {
      const filtered = newsData.filter(item => {
        const tabMatch = activeTab === "全部" || item.category === activeTab;
        return tabMatch && matchesSearchMonthHigh(item);
      });

      return filtered.sort((a, b) => {
        const direction = els.sort.value === "asc" ? 1 : -1;
        return a.date.localeCompare(b.date) * direction;
      });
    }

    function isHighImpact(impact) {
      return String(impact || "").includes("高");
    }

    function renderCard(item) {
      const tagHtml = item.tags.map(tag => `<span class="badge">${tag}</span>`).join("");
      const timelineHtml = item.updates
        .slice()
        .sort((a, b) => b.date.localeCompare(a.date))
        .map(u => `
          <div class="event">
            <div class="event-date">${formatDate(u.date)}</div>
            <div class="event-body">${u.text}</div>
          </div>
        `).join("");
      const sourceHtml = item.sources.map(src => `<a href="${src.url}" target="_blank" rel="noopener">${src.label}</a>`).join(" · ");

      return `
        <article class="card">
          <div class="card-main">
            <div class="card-top">
              <div>
                <h2>${item.title}</h2>
              </div>
              <div class="date">${formatDate(item.date)}</div>
            </div>
            <p class="summary">${item.summary}</p>
            <div class="badges">
              <span class="badge secondary">${item.category}</span>
              ${isHighImpact(item.viatrisImpact) ? `<span class="badge warning">Viatris高相关</span>` : ""}
              ${tagHtml}
            </div>
          </div>
          <details>
            <summary>展开新闻详解、新闻价值、启发观点和后续进展</summary>
            <div class="detail-box" style="margin-bottom:12px;">
              <h3>新闻详解</h3>
              <p>${item.detail}</p>
            </div>
            <div class="detail-grid">
              <div class="detail-box">
                <h3>新闻价值</h3>
                <p>${item.why}</p>
              </div>
              <div class="detail-box">
                <h3>启发与观点</h3>
                <p>${item.role}</p>
              </div>
            </div>
            <div class="detail-box">
              <h3>后续观察点</h3>
              <p>${item.watch.join("；")}。</p>
            </div>
            <h3 style="margin:12px 0 8px;color:var(--primary);font-size:13px;">事件进展</h3>
            <div class="timeline">${timelineHtml}</div>
            <div class="sources">${sourceHtml}</div>
          </details>
        </article>
      `;
    }

    function renderSide(filtered) {
      els.takeaways.innerHTML = weeklyTakeaways.map(x => `<li>${x}</li>`).join("");
      els.discussionPoints.innerHTML = discussionPoints.map(x => `<li>${x}</li>`).join("");
      const watchItems = filtered
        .flatMap(item => item.watch.slice(0, 2).map(w => ({ title: item.title, watch: w, date: item.date })))
        .slice(0, 8);
      els.watchList.innerHTML = watchItems.map(item => `<li><strong>${formatDate(item.date)}</strong> ${item.watch}</li>`).join("");
    }

    function renderStats(filtered) {
      const updates = filtered.reduce((sum, item) => sum + item.updates.length, 0);
      const high = filtered.filter(item => isHighImpact(item.viatrisImpact)).length;
      const latest = filtered.length ? filtered.map(i => i.date).sort().at(-1) : "-";
      els.statCount.textContent = filtered.length;
      els.statUpdates.textContent = updates;
      els.statHigh.textContent = high;
      els.statHighCard.classList.toggle("active", els.highOnly.checked);
      els.statLatest.textContent = latest === "-" ? "-" : formatDate(latest);
      els.statPageUpdated.textContent = formatDate(dashboardUpdated);
    }

    function render() {
      renderTabs();
      const filtered = getFiltered();
      els.list.innerHTML = filtered.map(renderCard).join("");
      els.empty.classList.toggle("show", filtered.length === 0);
      renderStats(filtered);
      renderSide(filtered);
    }

    function init() {
      const latestDate = newsData.map(item => item.date).sort().at(-1);
      els.updated.textContent = `本页更新：${formatDate(dashboardUpdated)} · ${newsData.length}个事件`;
      renderMonths();
      render();
      els.search.addEventListener("input", render);
      els.month.addEventListener("change", render);
      els.sort.addEventListener("change", render);
      els.highOnly.addEventListener("change", render);
      els.statHighCard.addEventListener("click", () => {
        els.highOnly.checked = !els.highOnly.checked;
        render();
      });
    }

    init();
  </script>
</body>
</html>
